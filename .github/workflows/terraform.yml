name: Limpeza Automatica Pihole
on:
  push:
    paths:
      - 'lista_pihole.txt'
jobs:
  limpar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python limpar_lista.py
      - name: Salvar lista limpa
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lista_limpa.txt
          git commit -m "Auto: Lista limpa atualizada" || exit 0
          git push
